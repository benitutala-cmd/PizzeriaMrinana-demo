<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pizzeria Marinara Demo</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(135deg,#7b2ff7,#f107a3,#ff7b00);color:#fff}
nav{padding:15px;background:rgba(0,0,0,.2);position:sticky;top:0}
nav a{color:#fff;text-decoration:none;margin:0 10px}
.hero{text-align:center;padding:80px 20px}
.categories,.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px;max-width:1200px;margin:auto}
.card{background:#fff;color:#111;border-radius:16px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:180px;object-fit:cover}
.card div{padding:15px}
#items{max-width:1200px;margin:auto;padding:20px}
.item{background:#fff;color:#111;margin:10px 0;padding:15px;border-radius:12px;display:flex;justify-content:space-between;align-items:center}
button{padding:10px 15px;border:none;border-radius:8px;background:#d62828;color:white;cursor:pointer}
.cart{position:fixed;right:10px;bottom:10px;background:#111;padding:15px;border-radius:10px}
</style>
</head>
<body>

<nav>
<a href="#">Hem</a>
<a href="#kategorier">Kategorier</a>
</nav>

<div class="hero">
<h1>Pizzeria Marinara</h1>
<p>Demo för restauranghemsida</p>
</div>

<section id="kategorier" class="categories">
<div class="card" onclick="showCategory('pizza')">
<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=1200">
<div><h3>Pizzor</h3><p>Alla pizzakategorier</p></div>
</div>

<div class="card" onclick="showCategory('kebab')">
<img src="https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=1200">
<div><h3>Kebab</h3><p>Kebabrätter</p></div>
</div>

<div class="card" onclick="showCategory('sallad')">
<img src="https://images.unsplash.com/photo-1546793665-c74683f339c1?w=1200">
<div><h3>Sallader</h3><p>Fräscha sallader</p></div>
</div>
</section>

<div id="items"></div>

<div class="cart">
Kundvagn: <span id="count">0</span>
</div>

<script>
let cart=0;

const menu={
pizza:[
{name:'Vesuvio',price:'113 kr'},
{name:'Capricciosa',price:'120 kr'},
{name:'Kebabpizza',price:'135 kr'}
],
kebab:[
{name:'Kebabtallrik',price:'120 kr'},
{name:'Falafelrulle',price:'110 kr'}
],
sallad:[
{name:'Kycklingsallad',price:'110 kr'}
]
};

function showCategory(cat){
 const div=document.getElementById('items');
 div.innerHTML='<h2 style="padding:20px">Kategori</h2>';
 menu[cat].forEach(item=>{
  div.innerHTML += `
  <div class="item">
   <div>
    <strong>${item.name}</strong><br>
    ${item.price}
   </div>
   <button onclick="orderItem('${item.name}')">Beställ</button>
  </div>`;
 });
}

function orderItem(name){
 cart++;
 document.getElementById('count').innerText=cart;
 alert('Demo-beställning: '+name+' har lagts i kundvagnen.');
}
</script>

</body>
</html>
