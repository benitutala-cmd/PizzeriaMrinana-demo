<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzeria Marinara Premium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,Arial,sans-serif;color:#fff;background:linear-gradient(135deg,#6a11cb,#b91372,#ff6a00)}
nav{position:sticky;top:0;background:rgba(0,0,0,.25);backdrop-filter:blur(12px);padding:16px;z-index:10}
nav ul{display:flex;justify-content:center;gap:24px;list-style:none}
nav a{color:#fff;text-decoration:none;font-weight:bold}
.hero{padding:120px 20px;text-align:center}
.hero h1{font-size:clamp(3rem,8vw,6rem)}
.hero span{color:#ffd700}
.btn{display:inline-block;margin:10px;padding:14px 26px;border-radius:40px;text-decoration:none;font-weight:bold}
.gold{background:#ffd700;color:#000}
.red{background:#d62828;color:#fff}
.section{max-width:1300px;margin:auto;padding:60px 20px}
h2{text-align:center;margin-bottom:25px;font-size:2.3rem}
.controls{text-align:center;margin-bottom:25px}
input,button{padding:10px 15px;border:none;border-radius:10px}
button{cursor:pointer;margin:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.card{background:rgba(255,255,255,.96);color:#111;border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.card img{width:100%;height:220px;object-fit:cover}
.card .c{padding:15px}
.price{font-weight:bold;color:#b91372}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.gallery img{width:100%;height:240px;object-fit:cover;border-radius:16px}
.contact{background:rgba(255,255,255,.12);padding:25px;border-radius:18px;text-align:center}
iframe{width:100%;height:450px;border:0;border-radius:20px}
footer{text-align:center;padding:30px;background:rgba(0,0,0,.2);margin-top:40px}
</style>
</head>
<body>

<nav>
<ul>
<li><a href="#menu">Meny</a></li>
<li><a href="#galleri">Galleri</a></li>
<li><a href="#karta">Hitta hit</a></li>
<li><a href="#kontakt">Kontakt</a></li>
</ul>
</nav>

<section class="hero">
<h1>PIZZERIA <span>MARINARA</span></h1>
<p>Pizza • Kebab • Gyros • Falafel</p><br>
<a class="btn gold" href="#menu">Se Menyn</a>
<a class="btn red" href="tel:011312764">Ring 011-31 27 64</a>
</section>

<section id="menu" class="section">
<h2>Vår Meny</h2>

<div class="controls">
<input id="search" placeholder="Sök maträtt...">
<button onclick="filterMenu('all')">Alla</button>
<button onclick="filterMenu('pizza')">Pizza</button>
<button onclick="filterMenu('kebab')">Kebab</button>
<button onclick="filterMenu('sallad')">Sallad</button>
</div>

<div id="menuGrid" class="grid"></div>
</section>

<section id="galleri" class="section">
<h2>Galleri</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=1200">
<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=1200">
<img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=1200">
<img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=1200">
</div>
</section>

<section id="karta" class="section">
<h2>Hitta till oss</h2>
<iframe src="https://www.google.com/maps?q=Finspångsvägen+129+Norrköping&output=embed"></iframe>
</section>

<section id="kontakt" class="section">
<div class="contact">
<h2>Kontakt</h2>
<p>📍 Finspångsvägen 129, Norrköping</p>
<p>📞 011-31 27 64</p>
<p>🕒 Öppet varje dag</p>
</div>
</section>

<footer>
<h3>Pizzeria Marinara</h3>
<p>Premium pizza, kebab och sallader.</p>
</footer>

<script>
const items=[
{name:"Vesuvio",cat:"pizza",img:"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=1200",desc:"Skinka, ost",price:"113 kr"},
{name:"Capricciosa",cat:"pizza",img:"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=1200",desc:"Skinka, champinjoner",price:"120 kr"},
{name:"Kebabpizza",cat:"pizza",img:"https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=1200",desc:"Kebab, sås",price:"135 kr"},
{name:"Kebabtallrik",cat:"kebab",img:"https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=1200",desc:"Kebab, pommes",price:"120 kr"},
{name:"Kycklingsallad",cat:"sallad",img:"https://images.unsplash.com/photo-1546793665-c74683f339c1?w=1200",desc:"Kyckling, sallad",price:"110 kr"}
];

let current="all";

function render(){
 const s=document.getElementById('search').value.toLowerCase();
 const grid=document.getElementById('menuGrid');
 grid.innerHTML='';
 items.filter(i=>(current==='all'||i.cat===current)&&i.name.toLowerCase().includes(s))
 .forEach(i=>{
  grid.innerHTML+=`<div class="card"><img src="${i.img}"><div class="c"><h3>${i.name}</h3><p>${i.desc}</p><p class="price">${i.price}</p></div></div>`;
 });
}
function filterMenu(c){current=c;render();}
document.getElementById('search').addEventListener('input',render);
render();
</script>

</body>
</html>
